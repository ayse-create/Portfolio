      <a href="index.html" class="logo">

        <button class="menu-toggle" id="menuToggle">☰</button>

  <section class="page contact-page">
    <div class="container">
      <div class="page-header">
        <span class="section-tag">✉️ İletişim</span>
        <h1 class="page-title">Bana <span class="gradient-text">Ulaş</span></h1>
        <p class="page-description">Bir mesaj bırak, en kısa sürede dönerim.</p>
      </div>
      <div class="contact-form-container">
        <form id="contactForm" class="contact-form">
          <div class="form-group">
            <label for="name">Adın</label>
            <input type="text" id="name" placeholder="Adını gir..." required />
          </div>
          <div class="form-group">
            <label for="email">E-posta</label>
            <input type="email" id="email" placeholder="ornek@mail.com" required />
          </div>
          <div class="form-group">
            <label for="message">Mesajın</label>
            <textarea id="message" rows="5" placeholder="Mesajını yaz..." required></textarea>
          </div>
          <button type="submit" class="btn btn-primary">🐱 Gönder</button>
        </form>
        <div class="contact-info">
          <p><strong>GitHub</strong><br /><a href="https://github.com/ayse-create" target="_blank">ayse-create</a></p>
          <p><strong>E-posta</strong><br /><a href="mailto:4936b43e103b4b31@teamchat.zoom.us">4936b43e103b4b31@teamchat.zoom.us</a></p>
          <p><strong>Kedi</strong><br />🐈 Tekir</p>
        </div>
      </div>
    </div>
  </section>

  <footer class="footer">
    <div class="container footer-container">
      <p class="footer-text">🐱 <span id="footerYear">2025</span> Beyzanur Akçin · Kedilerle kodlanmıştır.</p>
    </div>
